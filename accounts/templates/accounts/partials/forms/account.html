<div 
    x-show="isEditFormOpen" x-cloak
    class="bg-white rounded-xl shadow-sm border border-gray-200"
>

    <!-- Header -->
    <div class="p-6 border-b border-gray-100">
        <h2 class="text-lg font-semibold text-gray-800">
            Edit Profil
        </h2>
        <p class="text-sm text-gray-500">
            Perbarui informasi akun Anda.
            {{ form.instance.user.username }}
        </p>
    </div>

    <!-- Form -->
    <form
        action="{{ action_url }}"
        method="post"
        class="p-6 space-y-6"
    >
        {% csrf_token %}

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- Nama Lengkap -->
            <div>
                <label
                    for="id_nama"
                    class="block text-sm font-medium text-gray-700 mb-2"
                >
                    Nama Lengkap
                </label>
                <input
                    type="text"
                    id="id_nama"
                    name="nama"
                    value="{{ masyarakat_form.nama.value|default:'' }}"
                    class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>

            <!-- nik -->
            <div>
                <label
                    for="id_nik"
                    class="block text-sm font-medium text-gray-700 mb-2"
                >
                    NIK
                </label>
                <input
                    type="text"
                    id="id_nik"
                    name="nik"
                    value="{{ masyarakat_form.nik.value|default:'' }}"
                    class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>

            

            

            <!-- Nomor Telepon -->
            <div>
                <label
                    for="id_no_hp"
                    class="block text-sm font-medium text-gray-700 mb-2"
                >
                    Nomor Telepon
                </label>
                <input
                    type="text"
                    id="id_no_hp"
                    name="no_hp"
                    value="{{ masyarakat_form.no_hp.value|default:'' }}"
                    class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>

             <!-- Alamat -->
            <div>
                <label
                    for="id_alamat"
                    class="block text-sm font-medium text-gray-700 mb-2"
                >
                    Alamat
                </label>
                <input
                    type="text"
                    id="id_alamat"
                    name="alamat"
                    value="{{ masyarakat_form.alamat.value|default:'' }}"
                    class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>

            <!-- Username -->
            <div>
                <label
                    for="id_username"
                    class="block text-sm font-medium text-gray-700 mb-2"
                >
                    Username
                </label>
                <input
                    type="text"
                    id="id_username"
                    name="username"
                    value="{{ user_form.username.value|default:'' }}"
                    class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>

            <!-- Email -->
            <div>
                <label
                    for="id_email"
                    class="block text-sm font-medium text-gray-700 mb-2"
                >
                    Email
                </label>
                <input
                    type="email"
                    id="id_email"
                    name="email"
                    value="{{ user_form.email.value|default:'' }}"
                    class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>

            

        </div>

        <!-- Actions -->
        <div class="flex flex-wrap gap-3 pt-4 border-t border-gray-100">

            <button
                type="submit"
                class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
            >
                Simpan Perubahan
            </button>

            <a
                @click.prevent="$dispatch('reload-halaman')"
                href="{% url 'accounts:accounts_web:index' %}"
                class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition"
            >
                Batal
            </a>

        </div>

    </form>

</div>
