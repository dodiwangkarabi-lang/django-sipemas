<div x-data="{ activeTab: 'profile' }" class="w-full">

    <!-- Tab Navigation -->
    <div class="flex border-b border-gray-200">
        <button
            @click="activeTab = 'profile'"
            :class="activeTab === 'profile'
                ? 'border-blue-500 text-blue-600'
                : 'border-transparent text-gray-500 hover:text-gray-700'"
            class="px-4 py-2 border-b-2 font-medium transition">
            Profil
        </button>

        <button
            @click="activeTab = 'password'"
            :class="activeTab === 'password'
                ? 'border-blue-500 text-blue-600'
                : 'border-transparent text-gray-500 hover:text-gray-700'"
            class="px-4 py-2 border-b-2 font-medium transition whitespace-nowrap">
            Ubah Password
        </button>

        <button
            @click="activeTab = 'setting'"
            :class="activeTab === 'setting'
                ? 'border-blue-500 text-blue-600'
                : 'border-transparent text-gray-500 hover:text-gray-700'"
            class="px-4 py-2 border-b-2 font-medium transition">
            Pengaturan
        </button>
    </div>

    <!-- Content -->
    <div class="mt-6">

        <div x-show="activeTab === 'profile'" x-transition>
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-lg font-semibold">Profil</h2>
                <p class="text-gray-600 mt-2">
                    Informasi profil pengguna.
                </p>
            </div>
        </div>

        <div x-show="activeTab === 'password'" x-transition>
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-lg font-semibold">Ubah Password</h2>
                <p class="text-gray-600 mt-2">
                    Form ubah password.
                </p>
            </div>
        </div>

        <div x-show="activeTab === 'setting'" x-transition>
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-lg font-semibold">Pengaturan</h2>
                <p class="text-gray-600 mt-2">
                    Pengaturan aplikasi.
                </p>
            </div>
        </div>

    </div>

</div>
